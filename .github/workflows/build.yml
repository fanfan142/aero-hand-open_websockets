name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee build.log || true
          tail -100 build.log
          test -f app/build/outputs/apk/debug/app-debug.apk

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-log
          path: android/build.log

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aero-hand-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Create or update preview release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ci-latest
          name: Android CI Preview
          body: |
            自动发布的 Android 调试预览构建。

            - Commit: ${{ github.sha }}
            - Workflow: ${{ github.workflow }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          overwrite_files: true
          generate_release_notes: true
          prerelease: true
