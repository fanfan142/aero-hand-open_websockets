name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Show directory contents
        run: |
          echo "=== Android Directory ==="
          ls -la android/
          echo "=== Gradle Wrapper ==="
          ls -la android/gradlew*

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build with Gradle
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --info 2>&1 | tail -100
        shell: bash

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aero-hand-open-apk
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: android-v1.0.0
          release_name: Android App v1.0.0
          files: android/app/build/outputs/apk/debug/*.apk
          body: |
            ## Aero Hand Open Android App
            7DoF 控制应用，支持 WiFi 连接。
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
