name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Show files
        run: |
          echo "=== android/ ==="
          ls -la android/
          echo "=== app/ ==="
          ls -la android/app/
          echo "=== kotlin/ ==="
          ls -la android/app/src/main/java/com/aerohand/

      - name: Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace 2>&1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: apk
          path: android/app/build/outputs/apk/debug/*.apk
