name: Firmware Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-firmware:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: |
          cd scripts
          python build_versions.py

      - name: List built firmware
        run: |
          echo "=== Built firmware files ==="
          ls -la firmware_bin/firmware_*.bin 2>/dev/null || echo "No firmware files found"
          ls -la firmware_ws_build/v*/lefthand/.pio/build/esp32-s3-devkitc-1/*.bin 2>/dev/null || echo "Checking build directories..."

      - name: Create Firmware Package
        run: |
          mkdir -p firmware_release
          # Copy all lefthand and righthand bins from firmware_bin/
          cp firmware_bin/firmware_v*.bin firmware_release/ 2>/dev/null || true
          echo "=== Firmware package contents ==="
          ls -la firmware_release/

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-release-bin
          path: firmware_release/

      - name: Create GitHub release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Aero Hand Firmware ${{ github.ref_name }}
          body: |
            Aero Hand WebSocket 固件正式发布。

            ## 包含固件

            | 版本 | 左手 | 右手 |
            |------|------|------|
            | v0.1.0 | firmware_v0.1.0_lefthand.bin | firmware_v0.1.0_righthand.bin |
            | v0.1.3 | firmware_v0.1.3_lefthand.bin | firmware_v0.1.3_righthand.bin |
            | v0.1.4 | firmware_v0.1.4_lefthand.bin | firmware_v0.1.4_righthand.bin |
            | v0.1.5 | firmware_v0.1.5_lefthand.bin | firmware_v0.1.5_righthand.bin |
            | v0.2.0 | firmware_v0.2.0_lefthand.bin | firmware_v0.2.0_righthand.bin |

            ## 烧录说明

            1. 使用 esptool 或 ESP32 Flash Download Tool 烧录
            2. 烧录地址: 0x0000
            3. 波特率: 921600

            ## 源码

            源码位于 `firmware_ws/` 目录。

            - Commit: ${{ github.sha }}
            - Workflow: ${{ github.workflow }}
          files: |
            firmware_release/*
          overwrite_files: true
          generate_release_notes: true
          make_latest: true
