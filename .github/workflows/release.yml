name: Android Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      BASE_VERSION_NAME: 1.1.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Generate debug keystore for release build
        if: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 == '' || secrets.ANDROID_SIGNING_STORE_PASSWORD == '' || secrets.ANDROID_SIGNING_KEY_ALIAS == '' || secrets.ANDROID_SIGNING_KEY_PASSWORD == '' }}
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -v -keystore ~/.android/debug.keystore \
              -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Prepare signing keystore from secrets
        if: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 != '' && secrets.ANDROID_SIGNING_STORE_PASSWORD != '' && secrets.ANDROID_SIGNING_KEY_ALIAS != '' && secrets.ANDROID_SIGNING_KEY_PASSWORD != '' }}
        run: |
          echo "${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}" | base64 --decode > /tmp/android-signing.jks

      - name: Build release APK
        env:
          ANDROID_SIGNING_STORE_FILE: /tmp/android-signing.jks
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease -PCI_VERSION_NAME="${BASE_VERSION_NAME}" -PCI_VERSION_CODE="${{ github.run_number }}" --stacktrace --no-daemon 2>&1 | tee release-build.log
          tail -100 release-build.log
          test -f app/build/outputs/apk/release/app-release.apk

      - name: Upload release build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-release-build-log
          path: android/release-build.log

      - name: Upload release APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aero-hand-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Aero Hand Console ${{ github.ref_name }}
          body: |
            Android 正式发布构建。

            - Commit: ${{ github.sha }}
            - Workflow: ${{ github.workflow }}
          files: android/app/build/outputs/apk/release/app-release.apk
          overwrite_files: true
          generate_release_notes: true
          make_latest: true
