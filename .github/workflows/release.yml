name: Android Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        run: echo "VERSION_NAME=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Prepare signing keystore from secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          test -n "$KEYSTORE_BASE64"
          test -n "$STORE_PASSWORD"
          test -n "$KEY_ALIAS"
          test -n "$KEY_PASSWORD"
          echo "$KEYSTORE_BASE64" | base64 --decode > /tmp/android-signing.jks

      - name: Build release APK
        env:
          ANDROID_SIGNING_STORE_FILE: /tmp/android-signing.jks
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease -PCI_VERSION_NAME="${VERSION_NAME}" -PCI_VERSION_CODE="${{ github.run_number }}" --stacktrace --no-daemon 2>&1 | tee release-build.log
          tail -100 release-build.log
          test -f app/build/outputs/apk/release/app-release.apk

      - name: Rename APK to versioned name
        run: |
          mkdir -p android/app/build/outputs/apk/release/
          cp android/app/build/outputs/apk/release/app-release.apk "android/app/build/outputs/apk/release/HandControl-${VERSION_NAME}.apk"
          ls -la android/app/build/outputs/apk/release/HandControl-${VERSION_NAME}.apk

      - name: Upload release build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-release-build-log
          path: android/release-build.log

      - name: Upload release APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aero-hand-release-apk
          path: android/app/build/outputs/apk/release/HandControl-${VERSION_NAME}.apk

      - name: Create GitHub release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Aero Hand Console ${{ github.ref_name }}
          body: |
            Android 正式发布构建。

            - Commit: ${{ github.sha }}
            - Workflow: ${{ github.workflow }}
          generate_release_notes: true
          make_latest: true

      - name: Upload APK to release
        if: success()
        run: gh release upload ${{ github.ref_name }} "$GITHUB_WORKSPACE/android/app/build/outputs/apk/release/HandControl-${VERSION_NAME}.apk" --clobber
